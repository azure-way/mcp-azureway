name: Fetch and Upload Terraform AzureRM Docs
on:
  schedule:
    - cron: '0 1 * * *' # Runs at 1 AM UTC daily
  workflow_dispatch: # Allow manual triggering

permissions:
  id-token: write # Required for OIDC authentication
  contents: read # Required for GitHub API access

jobs:
  fetch_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.SPN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Fetch and process Terraform AzureRM docs
        env:
          STORAGE_ACCOUNT: mcpserverazurway
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e # Exit immediately on error

          # Check container metadata for version tags
          echo "Checking container metadata for existing version tags..."
          container_metadata=$(az storage container metadata show \
            --account-name $STORAGE_ACCOUNT \
            --name terraform-azure \
            --auth-mode login)

          # Get all releases from GitHub API
          echo "Fetching releases from GitHub..."
          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/hashicorp/terraform-provider-azurerm/releases" | jq -c '.[] | select(.tag_name >= "v3.0.0")')

          # Process each release
          echo "$releases" | while read -r release; do
            tag_name=$(echo "$release" | jq -r '.tag_name')
            # Remove periods from tag_name for use in filenames and paths
            clean_tag_name=$(echo "$tag_name" | tr -d '.')
            echo "Using clean tag name: $clean_tag_name"
            tarball_url=$(echo "$release" | jq -r '.tarball_url')

            # Skip if version already exists in either container list or metadata
            if echo "$container_metadata" | jq -e --arg tag "$clean_tag_name" '.[$tag] == "added"' >/dev/null; then
              echo "Skipping $tag_name - already exists"
              continue
            fi

            echo "Processing $tag_name..."
            echo "Downloading from $tarball_url"

            # Download and extract release
            temp_dir=$(mktemp -d)
            curl -sL -H "Authorization: token $GITHUB_TOKEN" "$tarball_url" -o "$temp_dir/release.tar.gz"
            tar -xzf "$temp_dir/release.tar.gz" -C "$temp_dir" --strip-components=1

            # echo "Generating container..."
            # Create container with metadata
            # az storage container create \
            #   --account-name $STORAGE_ACCOUNT \
            #   --name "terraform-azure-$tag_name" \
            #   --metadata \
            #       version=$tag_name \
            #       source="github.com/hashicorp/terraform-provider-azurerm" \
            #       processed_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            #   --auth-mode login

            echo "Uploading files to container..."

            # Generate docs
            echo "Uploading docs to container..."
            az storage blob upload-batch \
              --account-name $STORAGE_ACCOUNT \
              --destination "terraform-azure/$tag_name" \
              --source "$temp_dir/website/docs" \
              --auth-mode login

            # Update container metadata with new version
            echo "Updating container metadata with version $tag_name"
            az storage container metadata update \
              --account-name $STORAGE_ACCOUNT \
              --name terraform-azure \
              --metadata $clean_tag_name=added

            # Cleanup
            rm -rf "$temp_dir"
            echo "Successfully uploaded $tag_name"
          done
