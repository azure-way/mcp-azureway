name: Sync Fork and Upload Markdown Files
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC daily
  workflow_dispatch: # Allow manual triggering

permissions:
  id-token: write # Required for OIDC authentication
  contents: write # Required for fork syncing

jobs:
  sync_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Required for syncing

      - name: Sync fork with upstream
        uses: repo-sync/github-sync@v2
        with:
          source_repo: "https://github.com/MicrosoftDocs/azure-docs.git"
          source_branch: "main"
          destination_branch: "main"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.SPN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Upload markdown files to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name mcpserverazurway \
            --destination azure-docs \
            --source ./articles \
            --pattern '*.md' \
            --auth-mode login
